services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mahallasplus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password123@db:5432/mahallasplus"
      NEXTAUTH_SECRET: "your-secret-key-here"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      - db

volumes:
  postgres_data:
